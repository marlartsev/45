<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>45 / ТЕЛО НЕ СОВПАДАЕТ</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080006;
      color: #f3a3cb;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      display: block;
      background: #080006;
      touch-action: none;
      z-index: 1;
    }

    #ui {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      top: max(12px, env(safe-area-inset-top));
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      pointer-events: auto;
    }

    .btn {
      min-height: 44px;
      border: 1px solid rgba(244, 164, 203, 0.78);
      background: rgba(10, 0, 8, 0.70);
      color: #f3a3cb;
      font: 800 11px/1.15 Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-align: center;
      padding: 12px 10px;
      border-radius: 0;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:active {
      background: rgba(255, 115, 180, 0.18);
      transform: scale(0.985);
    }

    #fileInput {
      display: none;
    }

    #status {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 15;
      padding: 10px 11px;
      background: rgba(10, 0, 8, 0.62);
      color: rgba(255, 214, 235, 0.76);
      font: 700 10px/1.35 Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <canvas id="stage"></canvas>

  <div id="ui">
    <label class="btn" for="fileInput">Загрузить изображение</label>
    <button class="btn" id="soundBtn" type="button">Включить звук</button>
    <input id="fileInput" type="file" accept="image/*">
  </div>

  <div id="status">Загрузите изображение. Оно появится на фоне и внутри цифры 45.</div>

  <script>
    (function () {
      const canvas = document.getElementById("stage");
      const ctx = canvas.getContext("2d", { alpha: false });
      const fileInput = document.getElementById("fileInput");
      const soundBtn = document.getElementById("soundBtn");
      const status = document.getElementById("status");

      let dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      let w = 0;
      let h = 0;

      let image = null;
      let imageLoaded = false;

      let pointerDown = false;
      let px = 0.5;
      let py = 0.5;
      let lastX = 0;
      let lastY = 0;
      let dragVX = 0;
      let dragVY = 0;

      let instability = 0;
      let targetInstability = 0;
      let rotation = 0;
      let scalePulse = 0;

      let audioCtx = null;
      let breathOsc = null;
      let breathGain = null;
      let noiseGain = null;
      let noiseNode = null;
      let delay = null;
      let delayGain = null;
      let lastCrack = 0;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        w = Math.floor(window.innerWidth);
        h = Math.floor(window.innerHeight);

        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      resize();
      window.addEventListener("resize", resize);
      window.addEventListener("orientationchange", function () {
        setTimeout(resize, 250);
      });

      function coverRect(imgW, imgH, boxW, boxH) {
        const s = Math.max(boxW / imgW, boxH / imgH);
        const dw = imgW * s;
        const dh = imgH * s;
        return {
          x: (boxW - dw) / 2,
          y: (boxH - dh) / 2,
          w: dw,
          h: dh
        };
      }

      function drawDefaultBackground(t) {
        const g = ctx.createLinearGradient(0, 0, w, h);
        g.addColorStop(0, "#13020d");
        g.addColorStop(0.44, "#5c1737");
        g.addColorStop(1, "#070005");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = "#ff6daf";
        ctx.font = "900 " + Math.round(Math.min(w, h) * 0.42) + "px Inter, -apple-system, Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("45", w / 2, h / 2 + Math.sin(t * 0.001) * 10);
        ctx.restore();
      }

      function drawLoadedImage(t) {
        if (!imageLoaded || !image) {
          drawDefaultBackground(t);
          return;
        }

        const r = coverRect(image.width, image.height, w, h);
        const strips = 42;
        const stripH = h / strips;

        for (let i = 0; i < strips; i++) {
          const sy = (i / strips) * image.height;
          const sh = image.height / strips;
          const dy = i * stripH;

          const wave =
            Math.sin(i * 0.65 + t * 0.0022) * 12 * instability +
            Math.sin(i * 1.7 + t * 0.0011) * 4 * instability;

          ctx.drawImage(
            image,
            0,
            sy,
            image.width,
            sh,
            r.x + wave,
            r.y + (dy / h) * r.h,
            r.w,
            Math.ceil(stripH * (r.h / h)) + 1
          );
        }
      }

      function tintAndNoise(t) {
        ctx.save();

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(255, 62, 151, " + (0.18 + instability * 0.10) + ")";
        ctx.fillRect(0, 0, w, h);

        ctx.globalCompositeOperation = "multiply";
        ctx.fillStyle = "rgba(25, 0, 16, 0.30)";
        ctx.fillRect(0, 0, w, h);

        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = 0.20 + instability * 0.18;

        const count = Math.floor(900 + instability * 1300);
        ctx.fillStyle = "#ff9ed1";

        for (let i = 0; i < count; i++) {
          const x = Math.random() * w;
          const y = Math.random() * h;
          const hh = Math.random() * (6 + instability * 10);
          ctx.fillRect(x, y, 1, hh);
        }

        ctx.restore();

        const vg = ctx.createRadialGradient(w * 0.5, h * 0.48, Math.min(w, h) * 0.18, w * 0.5, h * 0.5, Math.max(w, h) * 0.72);
        vg.addColorStop(0, "rgba(0,0,0,0)");
        vg.addColorStop(1, "rgba(0,0,0,0.70)");
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, w, h);
      }

      function drawFortyFive(t) {
        const cx = w * 0.5;
        const cy = h * 0.51;
        const fontSize = Math.min(w * 0.70, h * 0.34);
        const text = "45";

        ctx.save();

        ctx.translate(cx, cy);
        ctx.rotate(rotation + Math.sin(t * 0.0012) * 0.025);
        ctx.scale(
          1 + Math.sin(t * 0.002) * 0.018 + instability * 0.06 + scalePulse,
          1 + Math.cos(t * 0.0017) * 0.018 - instability * 0.025
        );

        ctx.font = "900 " + fontSize + "px Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // 3D extrusion
        const depth = Math.floor(16 + instability * 26);
        for (let i = depth; i >= 1; i--) {
          const offset = i * (1.25 + instability * 0.6);
          const a = 0.25 + (i / depth) * 0.34;
          ctx.fillStyle = "rgba(139, 10, 72, " + a + ")";
          ctx.fillText(text, -offset, offset);
        }

        // dark shadow
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.filter = "blur(" + (10 + instability * 10) + "px)";
        ctx.fillStyle = "#000000";
        ctx.fillText(text, 8, 18);
        ctx.restore();

        // image inside number
        ctx.save();
        ctx.beginPath();
        ctx.fillText(text, 0, 0);
        ctx.clip();

        if (imageLoaded && image) {
          const boxW = fontSize * 1.45;
          const boxH = fontSize * 0.92;
          const r = coverRect(image.width, image.height, boxW, boxH);

          const shakeX = Math.sin(t * 0.003) * 18 * instability + (px - 0.5) * 32 * instability;
          const shakeY = Math.cos(t * 0.0025) * 14 * instability + (py - 0.5) * 28 * instability;

          ctx.drawImage(image, r.x - boxW / 2 + shakeX, r.y - boxH / 2 + shakeY, r.w, r.h);
        } else {
          const g = ctx.createLinearGradient(-fontSize, -fontSize, fontSize, fontSize);
          g.addColorStop(0, "#ff2d88");
          g.addColorStop(0.55, "#ff8fe1");
          g.addColorStop(1, "#5b1535");
          ctx.fillStyle = g;
          ctx.fillRect(-fontSize, -fontSize, fontSize * 2, fontSize * 2);
        }

        // flesh tint inside
        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = "rgba(255, 80, 165, " + (0.25 + instability * 0.16) + ")";
        ctx.fillRect(-fontSize, -fontSize, fontSize * 2, fontSize * 2);

        // inner scratches
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = "rgba(255, 210, 235, " + (0.18 + instability * 0.16) + ")";
        ctx.lineWidth = 1;
        for (let i = 0; i < 40 + instability * 70; i++) {
          const x = (Math.random() - 0.5) * fontSize * 1.4;
          const y = (Math.random() - 0.5) * fontSize * 0.9;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + (Math.random() - 0.5) * 18, y + Math.random() * 24);
          ctx.stroke();
        }

        ctx.restore();

        // main outline
        ctx.lineWidth = Math.max(3, fontSize * 0.028);
        ctx.strokeStyle = "rgba(255, 179, 220, 0.88)";
        ctx.strokeText(text, 0, 0);

        // unstable offset outlines
        if (instability > 0.04) {
          ctx.globalAlpha = Math.min(0.65, instability * 1.2);
          ctx.strokeStyle = "rgba(255, 35, 135, 0.9)";
          ctx.lineWidth = Math.max(1.5, fontSize * 0.010);
          ctx.strokeText(text, Math.sin(t * 0.004) * 12 * instability, Math.cos(t * 0.003) * 9 * instability);

          ctx.strokeStyle = "rgba(255, 220, 245, 0.55)";
          ctx.strokeText(text, -Math.cos(t * 0.003) * 10 * instability, Math.sin(t * 0.004) * 8 * instability);
        }

        ctx.restore();
      }

      function drawPointerDistortion(t) {
        if (instability < 0.02) return;

        const x = px * w;
        const y = py * h;
        const radius = 80 + instability * 140;

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
        g.addColorStop(0, "rgba(255, 110, 190, " + (0.24 * instability) + ")");
        g.addColorStop(1, "rgba(255, 110, 190, 0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function loadImageFromFile(file) {
        status.textContent = "Изображение загружается";

        const reader = new FileReader();

        reader.onload = function (event) {
          const img = new Image();

          img.onload = function () {
            image = img;
            imageLoaded = true;
            targetInstability = 0.65;
            scalePulse = 0.08;
            status.textContent = "Изображение загружено: оно на фоне и внутри 45.";
          };

          img.onerror = function () {
            status.textContent = "Не удалось загрузить изображение.";
          };

          img.src = event.target.result;
        };

        reader.onerror = function () {
          status.textContent = "Не удалось прочитать файл.";
        };

        reader.readAsDataURL(file);
      }

      fileInput.addEventListener("change", function () {
        const file = fileInput.files && fileInput.files[0];
        if (!file) {
          status.textContent = "Файл не выбран.";
          return;
        }
        loadImageFromFile(file);
      });

      function initAudio() {
        if (audioCtx) return;

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          status.textContent = "Звук не поддерживается этим браузером.";
          return;
        }

        audioCtx = new AudioContextClass();

        breathOsc = audioCtx.createOscillator();
        breathGain = audioCtx.createGain();

        breathOsc.type = "sine";
        breathOsc.frequency.value = 0.42;
        breathGain.gain.value = 0.025;

        delay = audioCtx.createDelay();
        delay.delayTime.value = 0.1;
        delayGain = audioCtx.createGain();
        delayGain.gain.value = 0.025;

        breathOsc.connect(breathGain);
        breathGain.connect(audioCtx.destination);
        breathGain.connect(delay);
        delay.connect(delayGain);
        delayGain.connect(audioCtx.destination);

        breathOsc.start();

        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;

        noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        noiseNode.loop = true;

        noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.007;

        noiseNode.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noiseNode.start();
      }

      function crack(power) {
        if (!audioCtx) return;

        const now = performance.now();
        if (now - lastCrack < 70) return;
        lastCrack = now;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = Math.random() > 0.5 ? "square" : "sawtooth";
        osc.frequency.value = 80 + Math.random() * 900;

        filter.type = "bandpass";
        filter.frequency.value = 500 + Math.random() * 2300;
        filter.Q.value = 7;

        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.05 * power, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.07);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      }

      soundBtn.addEventListener("click", function () {
        initAudio();

        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume();
        }

        soundBtn.textContent = "Звук включён";
        targetInstability = Math.min(1, targetInstability + 0.28);
        crack(0.6);
        status.textContent = imageLoaded ? "Звук включён. Тяните 45 пальцем." : "Звук включён. Теперь загрузите изображение.";
      });

      function startDrag(x, y) {
        pointerDown = true;
        lastX = x;
        lastY = y;
        px = x / w;
        py = y / h;
        targetInstability = Math.min(1, targetInstability + 0.20);
        crack(0.45);
      }

      function moveDrag(x, y) {
        px = x / w;
        py = y / h;

        if (!pointerDown) return;

        const dx = x - lastX;
        const dy = y - lastY;

        lastX = x;
        lastY = y;

        dragVX = dx;
        dragVY = dy;

        rotation += dx * 0.0008;
        targetInstability = Math.min(1, targetInstability + Math.min(1, (Math.abs(dx) + Math.abs(dy)) / 120) * 0.12);

        if (Math.abs(dx) + Math.abs(dy) > 24) {
          crack(Math.min(1, (Math.abs(dx) + Math.abs(dy)) / 120));
        }
      }

      function endDrag() {
        pointerDown = false;
      }

      canvas.addEventListener("touchstart", function (e) {
        e.preventDefault();
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);
      }, { passive: false });

      canvas.addEventListener("touchmove", function (e) {
        e.preventDefault();
        const t = e.touches[0];
        moveDrag(t.clientX, t.clientY);
      }, { passive: false });

      canvas.addEventListener("touchend", function (e) {
        e.preventDefault();
        endDrag();
      }, { passive: false });

      canvas.addEventListener("mousedown", function (e) {
        startDrag(e.clientX, e.clientY);
      });

      window.addEventListener("mousemove", function (e) {
        moveDrag(e.clientX, e.clientY);
      });

      window.addEventListener("mouseup", endDrag);

      function render(t) {
        requestAnimationFrame(render);

        targetInstability *= 0.982;
        instability += (targetInstability - instability) * 0.075;
        scalePulse *= 0.92;

        rotation += dragVX * 0.00003;
        dragVX *= 0.88;
        dragVY *= 0.88;

        drawLoadedImage(t);
        tintAndNoise(t);
        drawPointerDistortion(t);
        drawFortyFive(t);

        if (audioCtx && breathOsc) {
          breathOsc.frequency.setTargetAtTime(0.42 + instability * 1.3, audioCtx.currentTime, 0.06);
          breathGain.gain.setTargetAtTime(0.024 + instability * 0.07, audioCtx.currentTime, 0.06);
          noiseGain.gain.setTargetAtTime(0.007 + instability * 0.034, audioCtx.currentTime, 0.08);
          delay.delayTime.setTargetAtTime(0.08 + instability * 0.18, audioCtx.currentTime, 0.08);
          delayGain.gain.setTargetAtTime(0.018 + instability * 0.06, audioCtx.currentTime, 0.08);
        }
      }

      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
